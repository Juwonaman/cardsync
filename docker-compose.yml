version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: cardaggregator-db
    environment:
      POSTGRES_DB: cardaggregator
      POSTGRES_USER: carduser
      POSTGRES_PASSWORD: cardpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: